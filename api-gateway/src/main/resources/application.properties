spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.mvc.routes[1].id=incident-service
spring.cloud.gateway.mvc.routes[1].uri=lb://INCIDENT-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/incidents/**

spring.cloud.gateway.mvc.routes[2].id=serenazgo-service
spring.cloud.gateway.mvc.routes[2].uri=lb://SERENAZGO-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/serenazgo/**

spring.cloud.gateway.mvc.routes[3].id=patrullas-service
spring.cloud.gateway.mvc.routes[3].uri=lb://SERENAZGO-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/patrullas/**

spring.cloud.gateway.mvc.routes[4].id=asignaciones-service
spring.cloud.gateway.mvc.routes[4].uri=lb://SERENAZGO-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/asignaciones/**

spring.cloud.gateway.mvc.routes[5].id=admin-service
spring.cloud.gateway.mvc.routes[5].uri=lb://SERENAZGO-SERVICE
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/api/admin/**