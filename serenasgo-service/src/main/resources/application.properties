
spring.application.name=serenazgo-service

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/serenasgo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=${JWT_SECRET:alertaVecinalSecretClaveSuperSegura1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB